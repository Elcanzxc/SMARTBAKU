services:
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "SmartBaku2024!"
    ports:
      - "1433:1433"
    volumes:
      - sqldata:/var/opt/mssql
    healthcheck:
      test: /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "SmartBaku2024!" -C -Q "SELECT 1" || exit 1
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  api:
    build: ./src/SmartBaku.API
    environment:
      - ConnectionStrings__Default=Server=db;Database=SmartBaku;User Id=sa;Password=SmartBaku2024!;TrustServerCertificate=true
      - ASPNETCORE_URLS=http://+:5000
      - ASPNETCORE_ENVIRONMENT=Production
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "5005:5000"

  client:
    build:
      context: ./src/smartbaku-client
      args:
        VITE_API_URL: ""
    depends_on:
      - api
    ports:
      - "8080:80"

volumes:
  sqldata:
