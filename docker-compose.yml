services:
  api:
    build: ./src/SmartBaku.API
    environment:
      - ASPNETCORE_URLS=http://+:5000
      - ASPNETCORE_ENVIRONMENT=Production
    ports:
      - "5005:5000"

  client:
    build:
      context: ./src/smartbaku-client
      args:
        VITE_API_URL: ""
    depends_on:
      - api
    ports:
      - "80:80"
